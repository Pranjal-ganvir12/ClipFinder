version: "3.9"

services:
  backend:
    build: ./clipfinder/backend
    ports:
      - "8000:8000"
    volumes:
      - ./clipfinder/backend/storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./clipfinder/frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
